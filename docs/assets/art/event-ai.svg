<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="ai-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16283a"/><stop offset="1" stop-color="#0a0c13"/>
    </linearGradient>
    <pattern id="ai-ht" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#91c9ff" opacity="0.09"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#ai-bg)"/>
  <rect width="1600" height="900" fill="url(#ai-ht)"/>
  <!-- circuit traces -->
  <g stroke="#91c9ff" stroke-width="3" fill="none" opacity="0.45">
    <path d="M0 200 H260 V340 H420"/><path d="M1600 260 H1340 V420 H1180"/>
    <path d="M120 760 H360 V620"/><path d="M1480 720 H1240 V600"/>
    <circle cx="260" cy="200" r="7" fill="#91c9ff"/><circle cx="1340" cy="260" r="7" fill="#91c9ff"/>
    <circle cx="360" cy="620" r="7" fill="#91c9ff"/><circle cx="1240" cy="600" r="7" fill="#91c9ff"/>
  </g>
  <!-- robot head -->
  <g transform="translate(800 470)">
    <line x1="0" y1="-250" x2="0" y2="-180" stroke="#91c9ff" stroke-width="8"/>
    <circle cx="0" cy="-262" r="16" fill="#ff5c7a"/>
    <rect x="-200" y="-180" width="400" height="320" rx="44" fill="#161a27" stroke="#91c9ff" stroke-width="6"/>
    <rect x="-150" y="-110" width="120" height="90" rx="16" fill="#0a0c13" stroke="#91c9ff" stroke-width="4"/>
    <rect x="30" y="-110" width="120" height="90" rx="16" fill="#0a0c13" stroke="#91c9ff" stroke-width="4"/>
    <circle cx="-90" cy="-65" r="22" fill="#91c9ff"/><circle cx="90" cy="-65" r="22" fill="#91c9ff"/>
    <rect x="-120" y="40" width="240" height="40" rx="20" fill="#0a0c13" stroke="#f2c94c" stroke-width="4"/>
    <g fill="#f2c94c"><rect x="-100" y="52" width="30" height="16"/><rect x="-50" y="52" width="30" height="16"/><rect x="0" y="52" width="30" height="16"/><rect x="50" y="52" width="30" height="16"/></g>
  </g>
  <!-- chat bubbles -->
  <g>
    <rect x="320" y="380" width="200" height="110" rx="22" fill="#1d2235" stroke="#91c9ff" stroke-width="4"/>
    <path d="M360 490 l0 50 l50 -50 z" fill="#1d2235"/>
    <text x="420" y="448" text-anchor="middle" font-size="60" fill="#91c9ff" font-family="Arial">…</text>
    <rect x="1090" y="430" width="190" height="100" rx="22" fill="#1d2235" stroke="#f2c94c" stroke-width="4"/>
    <text x="1185" y="498" text-anchor="middle" font-size="40" fill="#f2c94c" font-family="Arial Black, Arial">01</text>
  </g>
</svg>
