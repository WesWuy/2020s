<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">2020s: The Game hero broadcast art</title>
  <desc id="desc">Satirical retro-futurist news broadcast meets comic-book apocalypse hero panel.</desc>
  <defs>
    <radialGradient id="redGlow" cx="20%" cy="18%" r="70%">
      <stop offset="0" stop-color="#ff5c7a" stop-opacity="0.75"/>
      <stop offset="0.42" stop-color="#61243a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#080a12" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="82%" cy="18%" r="65%">
      <stop offset="0" stop-color="#91c9ff" stop-opacity="0.65"/>
      <stop offset="0.4" stop-color="#1d416b" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#080a12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="greenBeam" x1="0" x2="1" y1="1" y2="0">
      <stop offset="0" stop-color="#7ee787" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#7ee787" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#91c9ff" stop-opacity="0.0"/>
    </linearGradient>
    <pattern id="halftone" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.4" fill="#ffffff" opacity="0.16"/>
      <circle cx="12" cy="12" r="1" fill="#ffffff" opacity="0.1"/>
    </pattern>
    <pattern id="scanlines" width="1" height="10" patternUnits="userSpaceOnUse">
      <rect width="1" height="1.5" fill="#ffffff" opacity="0.09"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="8" dy="8" stdDeviation="0" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#0b0d15"/>
  <rect width="1600" height="900" fill="url(#redGlow)"/>
  <rect width="1600" height="900" fill="url(#blueGlow)"/>
  <rect width="1600" height="900" fill="url(#greenBeam)"/>
  <rect width="1600" height="900" fill="url(#halftone)"/>
  <rect width="1600" height="900" fill="url(#scanlines)"/>

  <path d="M0 710 C210 660 310 780 510 720 C760 640 880 750 1120 690 C1320 640 1460 680 1600 620 L1600 900 L0 900 Z" fill="#111827" opacity="0.86"/>
  <path d="M120 720 L230 560 L340 720 Z M310 720 L455 500 L610 720 Z M560 720 L700 545 L845 720 Z M980 720 L1115 510 L1265 720 Z" fill="#1f2937" opacity="0.88"/>
  <path d="M1225 720 L1325 450 L1425 720 Z" fill="#243244" opacity="0.95"/>

  <g opacity="0.9">
    <circle cx="790" cy="420" r="150" fill="none" stroke="#f2c94c" stroke-width="8" stroke-dasharray="20 18"/>
    <circle cx="790" cy="420" r="235" fill="none" stroke="#91c9ff" stroke-width="3" stroke-dasharray="8 20" opacity="0.75"/>
    <circle cx="790" cy="420" r="315" fill="none" stroke="#ff5c7a" stroke-width="3" stroke-dasharray="18 26" opacity="0.55"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="85" y="72" width="1430" height="88" rx="16" fill="#080a12" opacity="0.78" stroke="#f2c94c" stroke-width="3"/>
    <rect x="105" y="91" width="160" height="50" rx="8" fill="#ff174d"/>
    <text x="135" y="126" fill="#fff" font-family="Arial Black, Impact, sans-serif" font-size="30" letter-spacing="2">LIVE</text>
    <text x="295" y="126" fill="#f7f0ff" font-family="Arial Black, Impact, sans-serif" font-size="32" letter-spacing="2">2020s TIMELINE BROADCAST // SIGNAL UNSTABLE</text>
  </g>

  <g filter="url(#shadow)">
    <text x="98" y="325" fill="#f7f0ff" font-family="Arial Black, Impact, sans-serif" font-size="118" letter-spacing="-4">2020s:</text>
    <text x="98" y="445" fill="#f2c94c" font-family="Arial Black, Impact, sans-serif" font-size="112" letter-spacing="-4">THE GAME</text>
    <text x="103" y="505" fill="#91c9ff" font-family="Arial, sans-serif" font-size="31" font-weight="800">Satirical retro-futurist news broadcast meets comic-book apocalypse.</text>
  </g>

  <g transform="translate(1080 260)" filter="url(#shadow)">
    <rect x="0" y="0" width="370" height="310" rx="28" fill="#0e1420" stroke="#91c9ff" stroke-width="4" opacity="0.9"/>
    <text x="30" y="58" fill="#f2c94c" font-family="Arial Black, Impact, sans-serif" font-size="26">CHOOSE YOUR RUN</text>
    <line x1="30" y1="82" x2="340" y2="82" stroke="#ffffff" opacity="0.25" stroke-width="3"/>
    <text x="30" y="137" fill="#ff5c7a" font-family="Arial Black, Impact, sans-serif" font-size="38">DYSTOPIA</text>
    <text x="30" y="180" fill="#7ee787" font-family="Arial Black, Impact, sans-serif" font-size="38">UTOPIA</text>
    <text x="30" y="236" fill="#f7f0ff" font-family="Arial, sans-serif" font-size="22" font-weight="700">Survive it or repair it.</text>
    <text x="30" y="270" fill="#91c9ff" font-family="Arial, sans-serif" font-size="18" font-weight="700">Sanity • Money • Influence • Timeline Health</text>
  </g>

  <g transform="translate(120 645)">
    <rect x="0" y="0" width="760" height="106" rx="18" fill="#080a12" opacity="0.78" stroke="#ffffff" stroke-opacity="0.2"/>
    <text x="28" y="42" fill="#f2c94c" font-family="Arial Black, Impact, sans-serif" font-size="28">BREAKING:</text>
    <text x="190" y="42" fill="#f7f0ff" font-family="Arial, sans-serif" font-size="25" font-weight="800">Reality is playable, but only barely.</text>
    <text x="28" y="78" fill="#91c9ff" font-family="Arial, sans-serif" font-size="20" font-weight="700">Race to 2030 without losing your grip on the timeline.</text>
  </g>
</svg>
