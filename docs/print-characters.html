<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2020s Print Characters</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="print-page">
  <main>
    <section class="card">
      <h1>2020s: The Board Game</h1>
      <p><strong>Printable Character Cards</strong></p>
      <p>Cut these out or use them as player reference sheets.</p>
    </section>

    <section class="card">
      <div class="deck-grid print-cards" id="characterGrid"></div>
    </section>

    <section class="card no-print-controls">
      <button onclick="window.print()" class="button">Print Characters</button>
      <a href="index.html" class="button secondary">Back to Prototype</a>
    </section>
  </main>

  <script src="game-data.js"></script>
  <script>
    const characterGrid = document.getElementById("characterGrid");
    GAME.characters.forEach(c => {
      const el = document.createElement("article");
      el.className = "mini-card printable-card";
      el.innerHTML = `<h2>${c.name}</h2><p class="stats">Sanity ${c.stats.sanity} · Money ${c.stats.money} · Influence ${c.stats.influence}</p><p><strong>Ability:</strong> ${c.ability}</p><p><strong>Weakness:</strong> ${c.weakness}</p><p class="flavor">“${c.flavor}”</p>`;
      characterGrid.appendChild(el);
    });
  </script>
</body>
</html>
